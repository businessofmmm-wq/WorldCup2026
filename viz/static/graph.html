<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WCPA — Backend Architecture (live graph)</title>
  <meta name="description" content="A live, interactive map of the WCPA engine: every backend module, how they connect, and the real data behind them." />
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <!-- fonts come self-hosted via @font-face in /style.css (no third-party CDN) -->
  <link rel="preload" href="/fonts/anton-latin.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* graph-specific layout — the album's tokens, a blueprint surface */
    .gwrap { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .gtop {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 10px 18px; background: linear-gradient(180deg,#2a1d12,#20150c);
      color: var(--paper); border-bottom: 4px solid var(--gold); z-index: 5;
    }
    .gtop .back { font-family: var(--font-lab); letter-spacing: 1.5px; text-decoration: none;
      color: #20150c; background: var(--gold); border: 2px solid #20150c; border-radius: 20px;
      padding: 4px 14px; box-shadow: var(--shadow-sm); }
    .gtop h1 { font-family: var(--font-disp); font-size: 1.4rem; letter-spacing: 1px; color: var(--paper); }
    .gtop .gsub { font-family: var(--font-lab); letter-spacing: 1px; font-size: .8rem; color: var(--gold); }
    .glive { margin-left: auto; display: flex; gap: 14px; flex-wrap: wrap; }
    .glive .stat { font-family: var(--font-lab); letter-spacing: 1px; font-size: .78rem; color: #d8c9a8; text-align: center; }
    .glive .stat b { display: block; font-family: var(--font-badge); font-size: 1.05rem; color: var(--gold); letter-spacing: 0; }

    .gmain { flex: 1; position: relative; min-height: 0; }
    .gstage { position: absolute; inset: 0; cursor: grab;
      background:
        radial-gradient(circle at 1px 1px, rgba(38,26,16,.10) 1px, transparent 1.6px) 0 0 / 26px 26px,
        var(--paper); }
    .gstage.panning { cursor: grabbing; }
    .gstage svg { width: 100%; height: 100%; display: block; touch-action: none; }

    .gnode rect { stroke-width: 2; rx: 9; transition: opacity .15s; }
    .gnode .n-name { font-family: var(--font-lab); font-size: 13px; letter-spacing: .4px; }
    .gnode .n-meta { font-family: var(--font-body); font-size: 9.5px; }
    .gnode { cursor: pointer; }
    .gedge { fill: none; stroke: rgba(42,29,18,.30); stroke-width: 1.6; transition: stroke .15s, opacity .15s; }
    .gedge.io { stroke-dasharray: 5 4; stroke: rgba(107,79,138,.55); }
    .dim { opacity: .14; }
    .gedge.hot { stroke: var(--terra); stroke-width: 2.6; opacity: 1; }
    .gnode.hot rect { stroke: var(--terra); stroke-width: 3.5; }

    .glegend { position: absolute; left: 14px; bottom: 14px; background: rgba(250,244,226,.92);
      border: 2.5px solid var(--card-edge); border-radius: 10px; padding: 10px 12px; box-shadow: var(--shadow-sm);
      font-family: var(--font-lab); letter-spacing: .5px; font-size: .72rem; max-width: 46vw; }
    .glegend .row { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
    .glegend .sw { width: 14px; height: 14px; border-radius: 4px; border: 1.5px solid var(--card-edge); flex: none; }
    .glegend .hint { color: var(--ink-soft); font-family: var(--font-body); letter-spacing: 0; margin-top: 6px; font-size: .72rem; }

    .gpanel { position: absolute; right: 14px; top: 14px; width: 300px; max-width: 84vw;
      background: var(--card); border: 3px solid var(--card-edge); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 16px 18px; transform: translateX(360px); transition: transform .22s ease;
      max-height: calc(100% - 28px); overflow:auto; }
    .gpanel.open { transform: none; }
    .gpanel .pclose { position: absolute; right: 10px; top: 8px; cursor: pointer; background: none; border: none;
      font-size: 1.2rem; color: var(--ink-soft); }
    .gpanel h2 { font-family: var(--font-disp); font-size: 1.5rem; word-break: break-word; }
    .gpanel .chip { display: inline-block; font-family: var(--font-lab); letter-spacing: 1px; font-size: .64rem;
      color: #fff; padding: 2px 9px; border-radius: 11px; border: 1.5px solid var(--card-edge); margin: 6px 0; }
    .gpanel .role { color: var(--ink-soft); font-size: .92rem; margin: 8px 0 12px; }
    .gpanel .klist { font-family: var(--font-body); font-size: .82rem; }
    .gpanel .klist h3 { font-family: var(--font-lab); letter-spacing: 1.5px; font-size: .76rem; color: var(--terra);
      margin: 12px 0 5px; }
    .gpanel .klist a { display: inline-block; background: var(--paper); border: 1.5px solid var(--cream-line);
      border-radius: 8px; padding: 2px 8px; margin: 2px 3px 2px 0; text-decoration: none; cursor: pointer; font-size: .78rem; }
    .gpanel .klist a:hover { background: var(--gold); }
    .gctrls { position: absolute; right: 14px; bottom: 14px; display: flex; gap: 6px; }
    .gctrls button { font-family: var(--font-badge); width: 36px; height: 36px; border-radius: 8px;
      border: 2.5px solid var(--card-edge); background: var(--card); cursor: pointer; box-shadow: var(--shadow-sm); }
    .gctrls button:hover { background: var(--gold); }
    @media (max-width: 640px) { .glegend { display: none; } .gpanel { width: 84vw; } }
  </style>
</head>
<body>
  <div class="gwrap">
    <header class="gtop">
      <a class="back" href="/">← Album</a>
      <div>
        <h1>Engine Architecture</h1>
        <div class="gsub">live connected graph · auto-drawn from source</div>
      </div>
      <div class="glive" id="glive"></div>
    </header>
    <div class="gmain">
      <div class="gstage" id="stage">
        <svg id="svg" xmlns="http://www.w3.org/2000/svg">
          <g id="viewport">
            <g id="edges"></g>
            <g id="nodes"></g>
          </g>
        </svg>
      </div>
      <div class="glegend" id="legend"></div>
      <aside class="gpanel" id="panel" aria-live="polite"></aside>
      <div class="gctrls">
        <button id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
        <button id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
        <button id="zoomFit" title="Fit to screen" aria-label="Fit to screen">⊡</button>
      </div>
    </div>
  </div>
  <script src="/graph_data.js"></script>
  <script src="/graph.js"></script>
</body>
</html>
