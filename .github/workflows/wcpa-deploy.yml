name: WCPA deploy

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC)

concurrency:
  group: wcpa-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      WORLDCUP_DATABASE_URL: ${{ secrets.WORLDCUP_DATABASE_URL }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WCPA_FOOTBALLDATA_TOKEN: ${{ secrets.WCPA_FOOTBALLDATA_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Init schema (idempotent — bootstraps a cold database)
        run: python run.py init

      - name: Ingest all sources (history + live + news + xG)
        run: python run.py ingest all

      - name: Train ratings
        run: python run.py train

      - name: Simulate tournament (50k)
        run: python run.py simulate 50000

      - name: Export static site
        run: python run.py export dist

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy --project-name=wcpa --branch=main --commit-dirty=true
