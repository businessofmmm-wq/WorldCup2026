name: WCPA full deploy

# Full, high-fidelity pipeline: rebuild everything from public sources and push.
# This is the cloud equivalent of `python manage.py deploy`.
#  - Runs on a schedule (a few times a day) and on demand (the "Run workflow" button).
#  - On a cold/empty database it bootstraps itself: `init` + `ingest all` populate
#    Neon from public data, so there is NO manual data migration to do.
#
# Cron is UTC. Defaults are deliberately modest to respect Actions minutes — see
# README / CLOUD-MIGRATION-SCOPE.md. On a PUBLIC repo Actions minutes are unlimited;
# on a private repo, tighten match-day cadence rather than running 24/7.

on:
  schedule:
    - cron: '0 6,18 * * *'      # 06:00 and 18:00 UTC daily
  workflow_dispatch: {}          # manual "deploy now" button in the Actions tab

# Never let two deploys publish at the same time; queue instead of overlap.
concurrency:
  group: wcpa-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      WORLDCUP_DATABASE_URL: ${{ secrets.WORLDCUP_DATABASE_URL }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Python deps (tiny — requests + psycopg)
        run: pip install -r requirements.txt

      - name: Init schema (idempotent — safe on a warm DB, bootstraps a cold one)
        run: python run.py init

      - name: Ingest all sources (history + live + news + xG)
        run: python run.py ingest all

      - name: Train ratings (Elo + Dixon-Coles + bivariate-Poisson)
        run: python run.py train

      - name: Simulate tournament (50k Monte Carlo)
        run: python run.py simulate 50000

      - name: Export static site to ./dist
        run: python run.py export dist

      - name: Deploy ./dist to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy --project-name=wcpa --branch=main --commit-dirty=true
