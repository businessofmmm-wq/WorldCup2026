name: WCPA publish

# Rebuilds and republishes the site within ~1-2 min of ANY push to master
# that touches the site or engine. No 50k re-sim — just export current data + deploy.
on:
  push:
    branches: [master]
    paths: ['viz/**', 'run.py', 'config.py', 'models/**', 'schema.sql']

concurrency:
  group: wcpa-deploy
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WORLDCUP_DATABASE_URL: ${{ secrets.WORLDCUP_DATABASE_URL }}
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      WCPA_FOOTBALLDATA_TOKEN: ${{ secrets.WCPA_FOOTBALLDATA_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: pip install -r requirements.txt
      - name: Rebuild static site from current data
        run: python run.py export dist
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy --project-name=wcpa --branch=main --commit-dirty=true
