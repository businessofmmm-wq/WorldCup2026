name: Refresh simulation

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WORLDCUP_DATABASE_URL: ${{ secrets.WORLDCUP_DATABASE_URL }}
      SPORTSDB_KEY: ${{ secrets.SPORTSDB_KEY || '3' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run refresh pipeline
        run: python run.py refresh
